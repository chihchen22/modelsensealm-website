<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Model Sense team org chart: Chih briefs Phil; Phil routes to Magic, Modeling Team, Book Team, Web Team, and Business Operations.">
  <defs>
    <style>
      .ms-box-bg { fill: #F6F6F4; }
      .ms-text { fill: #121312; font-family: 'Sora', system-ui, sans-serif; }
      .ms-text-serif { fill: #121312; font-family: 'Playfair Display', Georgia, serif; }
      .ms-text-muted { fill: rgba(18, 19, 18, 0.6); font-family: 'Sora', system-ui, sans-serif; }
      .ms-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; fill: rgba(18, 19, 18, 0.55); font-family: 'Sora', system-ui, sans-serif; font-weight: 600; }
      .ms-conn { stroke: #121312; stroke-width: 1; fill: none; opacity: 0.45; }
    </style>
  </defs>

  <!-- Connectors (drawn first so boxes overlay them) -->
  <!-- Chih -> Phil -->
  <path class="ms-conn" d="M 600 95 L 600 145" />

  <!-- Phil -> 5 group boxes (vertical from Phil bottom, horizontal trunk, vertical drops) -->
  <path class="ms-conn" d="M 600 245 L 600 285" />
  <path class="ms-conn" d="M 130 285 L 1070 285" />
  <path class="ms-conn" d="M 130 285 L 130 335" />
  <path class="ms-conn" d="M 365 285 L 365 335" />
  <path class="ms-conn" d="M 600 285 L 600 335" />
  <path class="ms-conn" d="M 835 285 L 835 335" />
  <path class="ms-conn" d="M 1070 285 L 1070 335" />

  <!-- Row 1: Chih -->
  <g transform="translate(500, 35)">
    <rect class="ms-box-bg" x="0" y="0" width="200" height="60" rx="4" ry="4" stroke="#121312" stroke-width="1.5" />
    <text class="ms-label" x="100" y="20" text-anchor="middle">Owner</text>
    <text class="ms-text-serif" x="100" y="44" text-anchor="middle" font-size="22" font-weight="400">Chih</text>
  </g>

  <!-- Row 2: Phil -->
  <g transform="translate(475, 145)">
    <rect class="ms-box-bg" x="0" y="0" width="250" height="100" rx="4" ry="4" stroke="#121312" stroke-width="2.5" />
    <text class="ms-label" x="125" y="22" text-anchor="middle">Orchestrator</text>
    <text class="ms-text-serif" x="125" y="52" text-anchor="middle" font-size="24" font-weight="400">Phil</text>
    <text class="ms-text-muted" x="125" y="76" text-anchor="middle" font-size="11">Sees the whole floor</text>
  </g>

  <!-- Row 3: Five group boxes -->

  <!-- Magic — Knowledge Base (teal) -->
  <g transform="translate(50, 335)">
    <rect class="ms-box-bg" x="0" y="0" width="160" height="110" rx="4" ry="4" stroke="#2B7A78" stroke-width="2" />
    <line x1="0" y1="0" x2="160" y2="0" stroke="#2B7A78" stroke-width="4" />
    <text class="ms-label" x="80" y="26" text-anchor="middle">Knowledge Base</text>
    <text class="ms-text-serif" x="80" y="54" text-anchor="middle" font-size="18" font-weight="400">Magic</text>
    <text class="ms-text-muted" x="80" y="78" text-anchor="middle" font-size="10">Librarian</text>
    <text class="ms-text-muted" x="80" y="93" text-anchor="middle" font-size="10">Single KB interface</text>
  </g>

  <!-- Modeling Team (green) -->
  <g transform="translate(285, 335)">
    <rect class="ms-box-bg" x="0" y="0" width="160" height="110" rx="4" ry="4" stroke="#3D7A42" stroke-width="2" />
    <line x1="0" y1="0" x2="160" y2="0" stroke="#3D7A42" stroke-width="4" />
    <text class="ms-label" x="80" y="26" text-anchor="middle">Modeling Team</text>
    <text class="ms-text-serif" x="80" y="54" text-anchor="middle" font-size="16" font-weight="400">Michael, Kobe</text>
    <text class="ms-text-serif" x="80" y="74" text-anchor="middle" font-size="16" font-weight="400">Steph, Dennis, Tim</text>
    <text class="ms-text-muted" x="80" y="95" text-anchor="middle" font-size="10">Build · Validate · Document</text>
  </g>

  <!-- Book Team (orange) -->
  <g transform="translate(520, 335)">
    <rect class="ms-box-bg" x="0" y="0" width="160" height="110" rx="4" ry="4" stroke="#C86A3A" stroke-width="2" />
    <line x1="0" y1="0" x2="160" y2="0" stroke="#C86A3A" stroke-width="4" />
    <text class="ms-label" x="80" y="26" text-anchor="middle">Book Team</text>
    <text class="ms-text-serif" x="80" y="54" text-anchor="middle" font-size="16" font-weight="400">Larry</text>
    <text class="ms-text-serif" x="80" y="74" text-anchor="middle" font-size="16" font-weight="400">Jerry</text>
    <text class="ms-text-muted" x="80" y="95" text-anchor="middle" font-size="10">Draft · Edit</text>
  </g>

  <!-- Web Team (purple) -->
  <g transform="translate(755, 335)">
    <rect class="ms-box-bg" x="0" y="0" width="160" height="110" rx="4" ry="4" stroke="#7050A0" stroke-width="2" />
    <line x1="0" y1="0" x2="160" y2="0" stroke="#7050A0" stroke-width="4" />
    <text class="ms-label" x="80" y="26" text-anchor="middle">Web Team</text>
    <text class="ms-text-serif" x="80" y="54" text-anchor="middle" font-size="18" font-weight="400">Allen</text>
    <text class="ms-text-muted" x="80" y="78" text-anchor="middle" font-size="10">Designer</text>
    <text class="ms-text-muted" x="80" y="93" text-anchor="middle" font-size="10">modelsense.com</text>
  </g>

  <!-- Business Operations (teal) -->
  <g transform="translate(990, 335)">
    <rect class="ms-box-bg" x="0" y="0" width="160" height="110" rx="4" ry="4" stroke="#2B7A78" stroke-width="2" />
    <line x1="0" y1="0" x2="160" y2="0" stroke="#2B7A78" stroke-width="4" />
    <text class="ms-label" x="80" y="26" text-anchor="middle">Business Ops</text>
    <text class="ms-text-serif" x="80" y="54" text-anchor="middle" font-size="16" font-weight="400">David</text>
    <text class="ms-text-serif" x="80" y="74" text-anchor="middle" font-size="16" font-weight="400">John</text>
    <text class="ms-text-muted" x="80" y="95" text-anchor="middle" font-size="10">Legal · Books</text>
  </g>

  <!-- Footer caption -->
  <text class="ms-text-muted" x="600" y="500" text-anchor="middle" font-size="11" font-style="italic">Chih briefs Phil. Phil routes to specialists. Specialists return to the owner inbox.</text>
</svg>
